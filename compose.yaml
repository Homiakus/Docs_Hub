services:
  docshub:
    build: .
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATA_DIR: "/data"
      SITE_NAME: "Docs Hub Next"
      ADMIN_USER: "admin"
      ADMIN_PASSWORD: "change-me-now"
      SESSION_SECRET: "replace-with-32-random-bytes"
    volumes:
      - ./data:/data
    restart: unless-stopped
