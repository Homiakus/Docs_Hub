services:
  docs-hub:
    build: .
    container_name: docs-hub
    command: ["/app/docs-hub", "serve"]
    environment:
      ADDR: ":8080"
      DATA_FILE: "/data/storage.json"
      ADMIN_USER: "admin"
      ADMIN_PASSWORD: "change-me-before-first-run"
      DOCS_HUB_MODE: "server"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    restart: unless-stopped
